name: CloudVisualizerReceiver
options:
  bundleIdPrefix: com.fascinatedbyeverything
  deploymentTarget:
    visionOS: "2.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: QJU4P9783P
    CODE_SIGN_STYLE: Automatic
    PRODUCT_NAME: "Cloud Receiver"
    PRODUCT_BUNDLE_IDENTIFIER: com.fascinatedbyeverything.cloud-visualizer-receiver
    SWIFT_STRICT_CONCURRENCY: complete
    SUPPORTED_PLATFORMS: "xros xrsimulator"
    TARGETED_DEVICE_FAMILY: "7"

targets:
  CloudVisualizerReceiver:
    type: application
    platform: visionOS
    sources:
      - path: Sources
        excludes:
          - "Resources/**"
      - path: Sources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        CFBundleName: "Cloud Receiver"
        CFBundleDisplayName: "Cloud Receiver"
        CFBundleIdentifier: com.fascinatedbyeverything.cloud-visualizer-receiver
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: $(EXECUTABLE_NAME)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Connects to your Mac to receive live 360° visualizer streams from Cloud Visualizer, eBoSuite, Ableton Syphon, or any HLS source."
        NSBonjourServices:
          - "_http._tcp"
          - "_rtsp._tcp"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations: {}
